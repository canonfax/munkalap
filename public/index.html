<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gyulabringa - Munkalap rendszer</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Sidebar Overlay (mobil) -->
  <div class="sidebar-overlay"></div>

  <!-- Sidebar -->
  <ashide class="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-title">Gyula<span>Bringa</span></div>
      <div class="sidebar-logo-sub">Shimano Service Center</div>
    </div>
    <nav class="sidebar-nav">
      <button class="nav-item active" data-oldal="dashboard">
        <span class="nav-ico">📊</span> Dashboard
      </button>
      <button class="nav-item" data-oldal="uj">
        <span class="nav-ico">➕</span> Új munkalap
      </button>
      <button class="nav-item" data-oldal="aktiv">
        <span class="nav-ico">🔧</span> Aktív munkák
        <span class="nav-badge" id="badge-aktiv">0</span>
      </button>
      <button class="nav-item" data-oldal="archiv">
        <span class="nav-ico">📦</span> Archiv
        <span class="nav-badge" id="badge-archiv">0</span>
      </button>
    </nav>
    <div class="sidebar-footer">GyulaBringa © 2025</div>
  </ashide>

  <!-- Main -->
  <div class="main">

    <!-- Topbar -->
    <div class="topbar">
      <div style="display: flex; align-items: center; gap: 1rem;">
        <button class="hamburger" id="hamburger" aria-label="Menü">
          <span></span><span></span><span></span>
        </button>
        <div class="topbar-title">📊 Dashboard</div>
      </div>
      <div class="topbar-right">
        <button class="btn btn-primary" id="btn-uj-munkalap">➕ Új munkalap</button>
      </div>
    </div>

    <!--
      Dashboard 
                -->
    <div class="content active" id="page-dashboard">

      <!-- Stat kártyák -->
      <div class="stat-grid">
        <div class="stat-card c-blue">
          <div class="stat-ico">🔧</div>
          <div><div class="stat-n" id="stat-aktiv">0</div><div class="stat-l">Aktív munka</div></div>
        </div>
        <div class="stat-card c-green">
          <div class="stat-ico">✅</div>
          <div><div class="stat-n" id="stat-kesz">0</div><div class="stat-l">Kész, átvételre vár</div></div>
        </div>
        <div class="stat-card c-orange">
          <div class="stat-ico">📦</div>
          <div><div class="stat-n" id="stat-archiv">0</div><div class="stat-l">Archivált</div></div>
        </div>
        <div class="stat-card c-red">
          <div class="stat-ico">💰</div>
          <div><div class="stat-n" id="stat-bevetel" style="font-size:1.1rem;">0 Ft</div><div class="stat-l">Havi bevétel</div></div>
        </div>
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem;">

        <!-- Naptár -->
        <div>
          <div class="card-title" style="margin-bottom:.75rem;">📅 Munkák naptára</div>
          <div id="calendar-wrap"></div>
        </div>

        <!-- Jobb oszlop -->
        <div>
          <!-- Legutóbbi munkák -->
          <div class="card">
            <div class="card-title">🕐 Legutóbbi aktív munkák</div>
            <div id="recent-list"></div>
        </div>

        <!-- Havi összesítő -->
        <div class="card">
          <div class="card-title">📊 Havi összesítés</div>
          <div class="form-group" style="margin-bottom: 1rem;">
            <label>Válassz hónapot</label>
            <input type="month" id="honap-valaszto">
          </div>
          <div id="osszesito-box"></div>
        </div>
      </div>

    </div>
  </div>

  <!-- 
      Új / Szerkeztő oldal
                          -->
  <div class="content" id="page-uj">
    <form id="munkalapForm" onsubmit="return false;">

      <!-- Munkalap szám + gombok -->
      <div style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; margin-bottom: 1.25rem;">
        <div>
          <div style="font-size: .7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .3rem;">Munkalap szám</div>
          <div class="munkalap-szam" id="ml-szam-display">-</div>
        </div>
        <div style="display: flex; gap: .5rem; flex-wrap: wrap;">
          <button type="button" class="btn btn-primary" id="btn-mentes">💾 Mentés</button>
          <button type="button" class="btn btn-success" id="btn-kesz">✅ Kerékpár kész</button>
          <button type="button" class="btn btn-ghost" id="btn-nyomtat">🖨️ Nyomtat/PDF</button>
          <button type="button" class="btn btn-danger" id="btn-torol">🗑️ Törlés</button>
        </div>
      </div>

      <!-- Ügyfél adatok -->
      
    </form>
  </div>
  
</body>
</html>
